version = 1
base_branch = "main"

# Variables — exposed to hooks as GIT_WORKSPACE_VAR_*
[vars]
environment = "staging"
service     = "git-workspace-demo"

# Fingerprints — content hash of file sets, exposed as GIT_WORKSPACE_FINGERPRINT_*
[[fingerprint]]
name      = "deps"
files     = ["package.json", "README.md"]
algorithm = "sha256"
length    = 10

# Symlink — shared across every worktree
[[link]]
source = "env.local"
target = ".env.local"

# Copy — each worktree gets its own templated copy
[[copy]]
source = "config.local.yaml"
target = "config.local.yaml"

# Always-on setup hook
[[hooks.on_setup]]
commands = ["on_setup"]

# Adaptive — only fires on feat/* branches
[[hooks.on_setup]]
conditions = { if_branch_matches = "feat/*" }
commands   = ["on_setup_feat"]

# On every interactive `up`
[[hooks.on_attach]]
commands = ["on_attach"]
