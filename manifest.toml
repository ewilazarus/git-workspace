# The manifest schema version. Used to ensure compatibility with the CLI.
version = 1

# The base branch to use when creating a new branch that does not already exist
# locally or on the remote. Existing local or remote branches are used as-is.
# This can be overridden with the `-b/--base` flag in `setup` and `up`.
base_branch = "main"

# Hook entries are relative paths to executables in `.workspace/bin`.
# Each hook is executed in the order listed.
[hooks]
after_setup = ["install-deps.sh"]
before_activate = []
after_activate = []
before_remove = []
after_remove = []

# Links are symbolic links relative from `.workspace/files` to your project 
# root.
# For overridden links, `git update-index --skip-worktree {target}` is called
# before the symbolic link is created.
# Non-overridden links are automatically added to `.git/info/exclude` so they
# do not leak into source control by accident.
[[link]]
source = ".env"
target = ".env"
override = true

[[link]]
source = "docker-compose.override.yml"
target = "docker-compose.override.yml"

# Prune defines the rules used by the `prune` command. Maximum age can be
# overridden with the `--older-than-days` flag.
# Excluded branches are never pruned, regardless of age.
[prune]
older_than_days = 30
exclude_branches = ["main"]
