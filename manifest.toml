# =============================================================================
# git-workspace manifest
# =============================================================================
#
# This file configures how git-workspace sets up and manages worktrees.
# Place it at `.workspace/manifest.toml` inside your workspace.

# Schema version. Used to ensure compatibility with the CLI.

version = 1

# =============================================================================
# Base branch
# =============================================================================
#
# The branch used as a starting point when creating a new worktree for a
# branch that does not already exist locally or on the remote.
# Can be overridden per-command with the `-b/--base` flag.

base_branch = "main"

# =============================================================================
# Links
# =============================================================================
#
# Symbolic links from `.workspace/assets` into each worktree.
# `source` is relative to `.workspace/assets`, `target` is relative to the
# worktree root.
#
# By default, linked targets are added to `.git/info/exclude` so they don't
# leak into source control. Set `override = true` to replace a tracked file
# instead — the target is marked with `git update-index --skip-worktree`
# before the symlink is created.
#
# Examples:

# [[link]]
# source = ".envrc"
# target = ".envrc"
#
# [[link]]
# source = "docker-compose.override.yml"
# target = "deployments/docker-compose.override.yml"
#
# [[link]]
# source   = "settings.json"
# target   = "settings.json"
# override = true

# =============================================================================
# Copies
# =============================================================================
#
# File copies from `.workspace/assets` into each worktree.
# Same `source`/`target`/`override` semantics as links, but the result is an
# independent file rather than a symlink — changes to the copy do not affect
# the original asset.
#
# Non-override copies are added to `.git/info/exclude`, just like links.
# Copies are idempotent: on `reset`, existing files are silently overwritten.
# Use copies when you need each worktree to have its own mutable version of a
# file (e.g. a local config that gets edited per-branch).
#
# Set `overwrite = false` to seed the file once (on first `up`) and preserve
# any local edits across subsequent `reset` calls. The file is still created
# if it does not exist. Defaults to `true`.
#
# Examples:

# [[copy]]
# source = "config.local.yaml"
# target = "config.local.yaml"
#
# [[copy]]
# source    = "config.local.yaml"
# target    = "config.local.yaml"
# overwrite = false
#
# [[copy]]
# source   = ".env.template"
# target   = ".env"
# override = true

# =============================================================================
# Variables
# =============================================================================
#
# Key-value pairs injected as environment variables into all hook scripts.
# Each key is normalized to uppercase with non-alphanumeric characters replaced
# by `_`, then prefixed with `GIT_WORKSPACE_VAR_`.
#
#   env_file = ".env.local"  →  GIT_WORKSPACE_VAR_ENV_FILE=".env.local"
#
# Variables can also be passed at runtime with `--var key=value` on commands
# like `up`, `reset`, and `rm`. Runtime values take precedence over manifest
# values.
#
# Examples:

# [vars]
# env_file = ".env.local"

# =============================================================================
# Fingerprints
# =============================================================================
#
# Named content hashes computed from a set of files at the worktree root.
# Each fingerprint is exposed as GIT_WORKSPACE_FINGERPRINT_<NORMALIZED_NAME>
# in hook and exec environments, letting hooks skip expensive steps when the
# relevant files have not changed (e.g. only rebuild a Docker image when the
# Dockerfile changes).
#
# Options:
#   name      — identifier; normalized the same way as variable names.
#   files     — paths relative to the worktree root; sorted before hashing.
#   algorithm — "sha256" (default) or "md5".
#   length    — number of hex characters to expose; defaults to 12.
#
# Examples:

# [[fingerprint]]
# name  = "deps"
# files = ["package.json", "package-lock.json"]
#
# [[fingerprint]]
# name      = "docker"
# files     = ["Dockerfile", "docker-compose.yml"]
# algorithm = "md5"
# length    = 8

# =============================================================================
# Hooks
# =============================================================================
#
# Lifecycle scripts executed at specific points during workspace operations.
# Each hook event can have multiple groups defined with [[hooks.<event>]].
# A group runs only when its `conditions` block matches the effective branch,
# or unconditionally when no conditions are specified. Groups are evaluated
# top-to-bottom in the order they appear in the manifest.
#
# Each command in a group is either a filename in `.workspace/bin/` or an
# inline shell command. If the entry matches a file in `.workspace/bin/`, it
# runs as a script; otherwise it is executed via `$SHELL`. You can mix both.
#
# All hooks receive GIT_WORKSPACE_* and GIT_WORKSPACE_VAR_* environment
# variables (see the Variables section above), plus any fingerprints defined
# in [[fingerprint]] blocks.
#
# Available events:
#   on_setup    — runs after a worktree is first created or reset.
#                 Use for installing dependencies, generating configs, etc.
#   on_attach   — runs on `up` in interactive mode only.
#                 Skipped when `--detached` is passed.
#   on_detach   — runs on `down` and at the start of `rm`.
#                 Counterpart to on_attach; use for session teardown.
#   on_teardown — runs on `rm`, after on_detach, before the worktree is
#                 deleted. Use for final cleanup.
#
# Conditions (optional):
#   if_branch_matches     — run only when the branch matches the glob pattern.
#   if_branch_not_matches — run only when the branch does NOT match the glob.
#   Both keys are AND-ed when present in the same group.
#
# Use `-a/--as <branch>` on any hook-running command to override which branch
# is used when evaluating conditions, without affecting the real branch.
#
# Examples:

# # Unconditional group — always runs
# [[hooks.on_setup]]
# commands = ["01-on-setup.sh"]
#
# # Only runs on your personal branches
# [[hooks.on_setup]]
# conditions = { if_branch_matches = "gabriel/*" }
# commands = ["open-tmux-session"]
#
# # Only runs on branches that are not your personal ones
# [[hooks.on_setup]]
# conditions = { if_branch_not_matches = "gabriel/*" }
# commands = ["echo 'not my branch'"]
#
# # AND — gabriel/* but not wip branches
# [[hooks.on_setup]]
# conditions = { if_branch_matches = "gabriel/*", if_branch_not_matches = "gabriel/wip-*" }
# commands = ["start-long-running-task"]
#
# [[hooks.on_attach]]
# commands = ["02-on-attach.sh"]
#
# [[hooks.on_detach]]
# commands = ["03-on-detach.sh"]
#
# [[hooks.on_teardown]]
# commands = ["04-on-teardown.sh"]

# =============================================================================
# Prune
# =============================================================================
#
# Rules for the `prune` command, which removes stale worktrees by age.
# `older_than_days` sets the age threshold (can be overridden with
# `--older-than-days` on the CLI). Branches listed in `exclude_branches`
# are never pruned, regardless of age.
#
# Example:

# [prune]
# older_than_days  = 30
# exclude_branches = ["main"]
